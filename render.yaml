version: "1"

projects:
  - name: cursor-cloud-agents-on-render
    environments:
      - name: production
        services:
          - type: web
            name: cursor-trigger-api
            runtime: node
            plan: starter
            rootDir: apps/trigger
            buildCommand: npm install && npm run build
            startCommand: npm run start
            healthCheckPath: /healthz
            envVars:
              - key: CURSOR_API_KEY
                sync: false
              - key: CURSOR_TARGET_REPOSITORY
                sync: false
              - key: DEFAULT_SOURCE_REF
                value: main
              - key: DEFAULT_CURSOR_MODEL
                value: default
              - key: DEFAULT_AUTO_CREATE_PR
                value: "true"
              - key: DEFAULT_OPEN_AS_CURSOR_GITHUB_APP
                value: "false"
              - key: DEFAULT_SKIP_REVIEWER_REQUEST
                value: "false"
              - key: TRIGGER_BASE_URL
                sync: false
              - key: CURSOR_WEBHOOK_SECRET
                sync: false
              - key: SLACK_SIGNING_SECRET
                sync: false
              - key: LINEAR_WEBHOOK_SECRET
                sync: false
              - key: LINEAR_API_KEY
                sync: false
              - key: LINEAR_COMMAND_PREFIX
                value: "@cursor"

          - type: worker
            name: cursor-self-hosted-worker
            runtime: docker
            plan: standard
            dockerContext: .
            dockerfilePath: docker/worker/Dockerfile
            envVars:
              - key: CURSOR_API_KEY
                sync: false
              - key: CURSOR_TARGET_REPOSITORY
                sync: false
              - key: CURSOR_TARGET_REF
                value: main
              - key: CURSOR_GIT_USERNAME
                value: x-access-token
              - key: CURSOR_GIT_TOKEN
                sync: false
              - key: CURSOR_WORKER_SINGLE_USE
                value: "false"
              - key: CURSOR_WORKER_IDLE_RELEASE_TIMEOUT
                value: "600"
              - key: CURSOR_WORKER_MANAGEMENT_ADDR
                value: ""
              - key: CURSOR_WORKER_EXTRA_ARGS
                value: ""
